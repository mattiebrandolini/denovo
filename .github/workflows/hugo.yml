name: Deploy Hugo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.142.0
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: America/New_York
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"


      - name: Install and run Pagefind
        run: |
          PAGEFIND_VERSION=1.3.0
          curl -sL https://github.com/CloudCannon/pagefind/releases/download/v${PAGEFIND_VERSION}/pagefind-v${PAGEFIND_VERSION}-x86_64-unknown-linux-musl.tar.gz | tar xz
          ./pagefind --site public --output-path public/pagefind

      # --- Quality Gates ---

      - name: Check for images without alt text in content
        run: |
          echo "Checking for images without alt text..."
          FAILURES=0
          # Check markdown image syntax: ![](url) with empty alt
          for f in $(find content -name '*.md' -type f); do
            # Match ![](anything) — empty alt bracket
            if grep -Pn '!\[\]\(' "$f"; then
              echo "❌ Missing alt text in: $f"
              FAILURES=$((FAILURES + 1))
            fi
          done
          # Check HTML img tags without alt
          for f in $(find content -name '*.md' -type f); do
            if grep -Pn '<img[^>]*(?<!alt=)[^>]*/?>' "$f" 2>/dev/null | grep -v 'alt='; then
              echo "❌ HTML img without alt in: $f"
              FAILURES=$((FAILURES + 1))
            fi
          done
          if [ "$FAILURES" -gt 0 ]; then
            echo ""
            echo "⚠️  Found $FAILURES file(s) with missing alt text."
            echo "Every image needs alt text for accessibility."
            exit 1
          fi
          echo "✅ All images have alt text."

      - name: Check for broken internal links
        run: |
          echo "Checking for broken internal links..."
          FAILURES=0
          # Find all internal href links in built HTML
          for f in $(find public -name '*.html' -type f); do
            # Extract internal links (starting with / but not //)
            for link in $(grep -oP 'href="(/[^"]*)"' "$f" | grep -oP '"/[^"]*"' | tr -d '"' | sort -u); do
              # Skip anchors-only, mailto, tel
              [[ "$link" == "#"* ]] && continue
              # Strip anchor from link for file check
              path="${link%%#*}"
              # Convert URL path to file path
              target="public${path}"
              # Check if it exists as file or directory with index.html
              if [ ! -f "$target" ] && [ ! -f "${target}index.html" ] && [ ! -f "${target}/index.html" ]; then
                echo "❌ Broken link in $(echo $f | sed 's|public/||'): $link"
                FAILURES=$((FAILURES + 1))
              fi
            done
          done
          if [ "$FAILURES" -gt 0 ]; then
            echo ""
            echo "⚠️  Found $FAILURES broken internal link(s)."
            exit 1
          fi
          echo "✅ All internal links valid."

      - name: Validate HTML structure
        run: |
          echo "Checking HTML structure..."
          FAILURES=0
          for f in $(find public -name '*.html' -type f); do
            PAGE=$(echo "$f" | sed 's|public/||')
            # Check for exactly one <main> element
            MAIN_COUNT=$(grep -c '<main' "$f" || true)
            if [ "$MAIN_COUNT" -ne 1 ]; then
              echo "❌ $PAGE has $MAIN_COUNT <main> elements (expected 1)"
              FAILURES=$((FAILURES + 1))
            fi
            # Check for exactly one <h1>
            H1_COUNT=$(grep -c '<h1' "$f" || true)
            if [ "$H1_COUNT" -gt 1 ]; then
              echo "❌ $PAGE has $H1_COUNT <h1> elements (expected 1)"
              FAILURES=$((FAILURES + 1))
            fi
            # Check that <html> has a lang attribute
            if ! grep -q '<html lang=' "$f"; then
              echo "❌ $PAGE missing lang attribute on <html>"
              FAILURES=$((FAILURES + 1))
            fi
          done
          if [ "$FAILURES" -gt 0 ]; then
            echo ""
            echo "⚠️  Found $FAILURES HTML structure issue(s)."
            exit 1
          fi
          echo "✅ HTML structure valid."

      # --- End Quality Gates ---

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
