baseURL = 'https://mattiebrandolini.github.io/denovo/'
languageCode = 'en-us'
title = 'De Novo'
enableRobotsTXT = true
enableGitInfo = true
theme = 'denovo'

[params]
  description = "Essays, fiction, and worldbuilding by Mattie Brandolini"
  author = "Mattie Brandolini"
  github = "https://github.com/mattiebrandolini/denovo"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = 'monokailight'

[menu]
  [[menu.main]]
    name = "Essays"
    url = "/essays/"
    weight = 1
  [[menu.main]]
    name = "Worlds"
    url = "/worlds/"
    weight = 2
  [[menu.main]]
    name = "Fiction"
    url = "/fiction/"
    weight = 3
  [[menu.main]]
    name = "Rules"
    url = "/rules/"
    weight = 4
  [[menu.main]]
    name = "Tools"
    url = "/tools/"
    weight = 5
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 6

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

# --- Taxonomies ---
[taxonomies]
  tag = "tags"
  series = "series"

[params.taxonomy]
  taxonomyCloud = ["tags"]

# --- Permalinks (locked per section — won't break if you reorganize files) ---
[permalinks]
  [permalinks.page]
    essays = "/essays/:slug/"
    fiction = "/fiction/:slug/"
    worlds = "/worlds/:slug/"
    rules = "/rules/:slug/"
    tools = "/tools/:slug/"

# --- Related content engine ---
[related]
  includeNewer = true
  threshold = 80
  toLower = true

  [[related.indices]]
    name = "tags"
    weight = 100
    toLower = true

  [[related.indices]]
    name = "series"
    weight = 200
    toLower = true

  [[related.indices]]
    name = "date"
    weight = 10

# --- Frontmatter date handling ---
[frontmatter]
  lastmod = [":git", "lastmod", "date"]
