{{ define "main" }}
<article class="tool-page">
  <div class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Params.description }}<p class="page-description">{{ . }}</p>{{ end }}
  </div>
  <noscript>
    <div class="tool-noscript">
      <p><strong>This tool requires JavaScript to run.</strong></p>
      {{ with .Params.noscript_description }}
      <p>{{ . }}</p>
      {{ else }}
      <p>{{ .Title }} is an interactive tool that needs a browser with JavaScript enabled. If you're on a school network that blocks scripts, try accessing this page from a personal device.</p>
      {{ end }}
    </div>
  </noscript>
  <div class="tool-container js-only">
    <div class="tool-loading" id="tool-loading">
      <div class="tool-spinner"></div>
      <p>Loading...</p>
    </div>
    <div class="tool-error" id="tool-error" style="display:none">
      <p>Something went wrong loading this tool.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
    <div class="tool-app" id="tool-app">
      {{ .Content }}
    </div>
  </div>
</article>
<script>
  window.toolReady = function() {
    document.getElementById('tool-loading').style.display = 'none';
    document.getElementById('tool-app').style.opacity = '1';
  };
  window.toolError = function(msg) {
    document.getElementById('tool-loading').style.display = 'none';
    var err = document.getElementById('tool-error');
    if (msg) err.querySelector('p').textContent = msg;
    err.style.display = 'block';
  };
  if (document.getElementById('tool-app').children.length > 0) {
    window.toolReady();
  }
</script>
{{ end }}
