{{ define "main" }}
<div data-pagefind-ignore>
<div class="page-header">
  <h1>Tags</h1>
</div>

<div class="tag-cloud">
  {{ range .Data.Terms.Alphabetical }}
  <a href="{{ .Page.RelPermalink }}" class="tag-pill">{{ .Page.Title }} <span class="tag-count">{{ .Count }}</span></a>
  {{ end }}
</div>
</div>
{{ end }}
