<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if not .IsHome }}{{ .Title }} · {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <script>
    (function() {
      var d = document.documentElement;
      var s = localStorage;
      var theme = s.getItem('dn-theme');
      if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        d.setAttribute('data-theme', 'dark');
      }
      var size = s.getItem('dn-textsize');
      if (size) d.setAttribute('data-textsize', size);
      if (s.getItem('dn-spacing') === 'on') d.setAttribute('data-linespacing', 'wide');
      if (s.getItem('dn-font') === 'dyslexic') d.setAttribute('data-font', 'dyslexic');
      if (s.getItem('dn-motion') === 'on' || window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        d.setAttribute('data-motion', 'reduced');
      }
      if (s.getItem('dn-colorblind') === 'on') d.setAttribute('data-colorblind', 'on');
    })();
  </script>
  <link rel="icon" href="{{ "favicon.ico" | absURL }}" type="image/x-icon">
  <link rel="icon" href="{{ "favicon.png" | absURL }}" type="image/png">
  {{ with .OutputFormats.Get "RSS" }}<link rel="alternate" type="application/rss+xml" title="{{ $.Site.Title }}" href="{{ .Permalink }}">{{ end }}
  <meta property="og:title" content="{{ if not .IsHome }}{{ .Title }} · {{ end }}{{ .Site.Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ .Site.Title }}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ if not .IsHome }}{{ .Title }} · {{ end }}{{ .Site.Title }}">
  <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="{{ "css/style.css" | absURL }}">
</head>
<body class="{{ with .Section }}layout-{{ . }}{{ end }}">
  <div class="container">
    {{ partial "header.html" . }}
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </div>
  <script>
    (function() {
      var d = document.documentElement;
      var s = localStorage;
      var panel = document.querySelector('.a11y-panel');
      var trigger = document.querySelector('.a11y-trigger');
      var isOpen = false;

      // --- Panel open/close ---
      function openPanel() {
        isOpen = true;
        panel.style.display = 'block';
        trigger.setAttribute('aria-expanded', 'true');
      }
      function closePanel() {
        isOpen = false;
        panel.style.display = 'none';
        trigger.setAttribute('aria-expanded', 'false');
      }
      trigger.addEventListener('click', function(e) {
        e.stopPropagation();
        if (isOpen) { closePanel(); } else { openPanel(); }
      });
      document.addEventListener('click', function(e) {
        if (isOpen && !panel.contains(e.target) && e.target !== trigger) {
          closePanel();
        }
      });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && isOpen) closePanel();
      });

      // --- Make every toggle-switch area clickable ---
      document.querySelectorAll('.toggle-switch').forEach(function(sw) {
        sw.addEventListener('click', function(e) {
          var cb = sw.querySelector('input[type="checkbox"]');
          if (e.target !== cb) {
            cb.checked = !cb.checked;
            cb.dispatchEvent(new Event('change', { bubbles: true }));
          }
        });
      });

      // --- Also make labels toggle their checkboxes on click ---
      document.querySelectorAll('.a11y-option > label[for]').forEach(function(lbl) {
        lbl.addEventListener('click', function(e) {
          e.preventDefault();
          var cb = document.getElementById(lbl.getAttribute('for'));
          if (cb) {
            cb.checked = !cb.checked;
            cb.dispatchEvent(new Event('change', { bubbles: true }));
          }
        });
      });

      // --- Setting handlers ---
      function get(id) { return document.getElementById(id); }

      // Dark mode
      var darkCb = get('a11y-dark');
      darkCb.checked = d.getAttribute('data-theme') === 'dark';
      darkCb.addEventListener('change', function() {
        if (darkCb.checked) {
          d.setAttribute('data-theme', 'dark');
          s.setItem('dn-theme', 'dark');
        } else {
          d.removeAttribute('data-theme');
          s.setItem('dn-theme', 'light');
        }
      });

      // Reduced motion
      var motionCb = get('a11y-motion');
      motionCb.checked = d.hasAttribute('data-motion');
      motionCb.addEventListener('change', function() {
        if (motionCb.checked) {
          d.setAttribute('data-motion', 'reduced');
          s.setItem('dn-motion', 'on');
        } else {
          d.removeAttribute('data-motion');
          s.removeItem('dn-motion');
        }
      });

      // Dyslexic font
      var dysCb = get('a11y-dyslexic');
      dysCb.checked = d.getAttribute('data-font') === 'dyslexic';
      dysCb.addEventListener('change', function() {
        if (dysCb.checked) {
          d.setAttribute('data-font', 'dyslexic');
          s.setItem('dn-font', 'dyslexic');
        } else {
          d.removeAttribute('data-font');
          s.removeItem('dn-font');
        }
      });

      // Line spacing
      var spaceCb = get('a11y-spacing');
      spaceCb.checked = d.hasAttribute('data-linespacing');
      spaceCb.addEventListener('change', function() {
        if (spaceCb.checked) {
          d.setAttribute('data-linespacing', 'wide');
          s.setItem('dn-spacing', 'on');
        } else {
          d.removeAttribute('data-linespacing');
          s.removeItem('dn-spacing');
        }
      });

      // Colorblind
      var cbCb = get('a11y-colorblind');
      cbCb.checked = d.hasAttribute('data-colorblind');
      cbCb.addEventListener('change', function() {
        if (cbCb.checked) {
          d.setAttribute('data-colorblind', 'on');
          s.setItem('dn-colorblind', 'on');
        } else {
          d.removeAttribute('data-colorblind');
          s.removeItem('dn-colorblind');
        }
      });

      // Text size
      var sizeBtns = document.querySelectorAll('.size-btn');
      var currentSize = d.getAttribute('data-textsize') || 'medium';
      function setSize(size) {
        sizeBtns.forEach(function(b) {
          b.classList.toggle('active', b.getAttribute('data-size') === size);
        });
        if (size === 'medium') {
          d.removeAttribute('data-textsize');
          s.removeItem('dn-textsize');
        } else {
          d.setAttribute('data-textsize', size);
          s.setItem('dn-textsize', size);
        }
      }
      setSize(currentSize);
      sizeBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
          setSize(btn.getAttribute('data-size'));
        });
      });
    })();
  </script>
</body>
</html>
