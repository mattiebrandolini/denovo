<header class="site-header">
  <div class="site-title">
    <a href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
  </div>
  <nav class="site-nav">
    {{- range .Site.Menus.main }}
    <a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a>
    {{- end }}
  </nav>
</header>
